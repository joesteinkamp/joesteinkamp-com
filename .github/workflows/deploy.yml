name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Nightly rebuild so the GitHub feed stays fresh without any content change.
  schedule:
    - cron: '17 8 * * *'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (fetches GitHub data)
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy (atomic release + symlink swap)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          BASE: ${{ secrets.DEPLOY_PATH }} # e.g. /var/www/joesteinkamp
        run: |
          set -euo pipefail
          STAMP=$(date +%Y%m%d%H%M%S)
          REL="$BASE/releases/$STAMP"
          ssh "$SSH_USER@$HOST" "mkdir -p '$REL'"
          rsync -az --delete dist/ "$SSH_USER@$HOST:$REL/"
          # flip the 'current' symlink, then prune all but the last 5 releases
          ssh "$SSH_USER@$HOST" "ln -sfn '$REL' '$BASE/current' && ls -dt $BASE/releases/*/ | tail -n +6 | xargs -r rm -rf"
          echo "Deployed $STAMP"
