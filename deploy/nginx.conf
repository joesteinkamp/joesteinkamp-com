# Sample nginx server block for the static site.
# nginx serves $BASE/current, which the deploy workflow points at the newest
# release. Rollback = repoint the symlink to a previous release dir.
#
#   sudo ln -sfn /var/www/joesteinkamp/releases/<stamp> /var/www/joesteinkamp/current
#
# Phase 1 (staging): use jsweb.joesteinkamp.com while WordPress keeps the apex.
# Phase 3 (cutover): change server_name to joesteinkamp.com (+ www), retire WP.

server {
    listen 80;
    listen [::]:80;
    server_name jsweb.joesteinkamp.com;

    root /var/www/joesteinkamp/current;
    index index.html;

    # Astro outputs /path/index.html — try directory, then .html, then 404.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Long-cache fingerprinted assets.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/joesteinkamp.access.log;
    error_log  /var/log/nginx/joesteinkamp.error.log;
}

# After cutover, add TLS via certbot:
#   sudo certbot --nginx -d joesteinkamp.com -d www.joesteinkamp.com
